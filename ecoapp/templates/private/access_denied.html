<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied - EcoCleanUp Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body class="bg-light">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-danger text-white">
              <h1 class="h4 mb-0">Access Denied</h1>
            </div>
            <div class="card-body">
              <p class="mb-3">Your account is not authorised to view this page.</p>
              <p class="mb-0">
                Go back to
                <a href="{% if session['role'] == 'volunteer' %}{{ url_for('volunteer_home') }}{% elif session['role'] == 'event_leader' %}{{ url_for('event_leader_home') }}{% else %}{{ url_for('admin_home') }}{% endif %}">home</a>
                or
                <a href="{{ url_for('logout') }}">log out</a>
                and sign in with a different account.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
